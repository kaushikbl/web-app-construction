
services:
  mongo:
    image: mongo:6.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017/house_expenses
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      - ./backend/uploads:/usr/src/app/uploads   # persist uploaded bill images
    depends_on:
      - mongo

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"   # map nginx port 80 -> localhost:3000
    depends_on:
      - backend

volumes:
  mongo_data:
